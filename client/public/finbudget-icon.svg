<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background - emerald green -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#shine)" opacity="0.3"/>

  <!-- Dollar sign circle (top-right accent) -->
  <circle cx="370" cy="130" r="55" fill="rgba(255,255,255,0.2)"/>
  <text x="370" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="65" font-weight="700" fill="white" text-anchor="middle">$</text>

  <!-- Bold "FB" letterform -->
  <g transform="translate(70, 120)">
    <!-- F -->
    <rect x="0" y="0" width="38" height="250" rx="19" fill="white"/>
    <rect x="0" y="0" width="160" height="38" rx="19" fill="white"/>
    <rect x="0" y="105" width="120" height="34" rx="17" fill="white" opacity="0.85"/>
  </g>

  <!-- Rising bar chart (bottom area) -->
  <rect x="260" y="310" width="44" height="70" rx="8" fill="white" opacity="0.5"/>
  <rect x="318" y="270" width="44" height="110" rx="8" fill="white" opacity="0.65"/>
  <rect x="376" y="220" width="44" height="160" rx="8" fill="white" opacity="0.8"/>

  <!-- Upward arrow -->
  <polyline points="282,310 340,265 398,215" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="398,205 410,225 386,225" fill="white"/>
</svg>